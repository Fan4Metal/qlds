# Second game server: PQL Instagib FFA. Merge it on top of compose.yml:
#
#   docker compose -f compose.yml -f compose.instagib_ffa_pql.yml up -d
#
# The shared `workshop` init service, `redis`, and the named volumes all come
# from compose.yml unchanged; this file only adds the extra server.
services:
  instagib_ffa_pql:
    image: quakeliveserverstandards/ql-server
    restart: always
    ports:
      - 27961:27961/udp # game port
      - 27961:27961/tcp # stats port
      - 28961:28961 # rcon port
    environment:
      - NET_PORT=27961
    volumes:
      - ./access.txt:/home/steam/ql/baseq3/access.txt:ro
      - ./instagib_ffa_pql/autoexec.cfg:/home/steam/ql/baseq3/autoexec.cfg:ro
      - ./instagib_ffa_pql/secret.cfg:/home/steam/ql/baseq3/secret.cfg:ro
      - ./instagib_ffa_pql/server.cfg:/home/steam/ql/baseq3/server.cfg:ro
      - ./instagib_ffa_pql/mappool_instagib_ffa_pql.txt:/home/steam/ql/baseq3/mappool.txt:ro
      - ./instagib_ffa_pql/minqlx-plugins:/home/steam/ql/minqlx-plugins:ro
      - ./instagib_ffa_pql/workshop.txt:/home/steam/ql/baseq3/workshop.txt:ro
      # Custom game factory: QL loads *.factories from baseq3/scripts/.
      - ./instagib_ffa_pql/instagib_ffa_pql.factories:/home/steam/ql/baseq3/scripts/instagib_ffa_pql.factories:ro
      # Workshop content pre-fetched by the `workshop` service (read-only here).
      # The steamcmd-written manifest marks the items as installed, so the QL
      # server skips its own (unreliable) download.
      - steamapps:/home/steam/ql/steamapps:ro
    depends_on:
      workshop:
        condition: service_completed_successfully
      redis:
        condition: service_started
